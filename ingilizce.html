<head>
    <div id="tutorialOverlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 10000; opacity: 1; transition: opacity 0.5s ease;">

            Welcome !<br>getting ready...

        <div style="position: relative; width: 140px; height: 140px; margin: 20px 0;">

                <path d="M 50,10 A 40,40 0 0 1 90,50" fill="none" stroke="#e74c3c" stroke-width="4" stroke-linecap="round" />

                    @keyframes arrowAnim { 0% { opacity: 0; transform: rotate(-20deg); } 20% { opacity: 1; } 80% { opacity: 1; transform: rotate(160deg); } 100% { opacity: 0; transform: rotate(180deg); } }
                    .animate-arrow { animation: arrowAnim 6s infinite; }
                </style>
            </svg>
            
            <div id="tutCrank" style="width: 100%; height: 100%; border: 5px solid #1a1a1a; border-radius: 50%; position: relative; transition: transform 5s ease-in-out; transform: rotate(0deg);">

            </div>
        </div>

        <div style="width: 240px; height: 120px; background: #222; margin: 25px 0; position: relative; overflow: hidden; border: 3px solid #000; border-radius: 5px;">
            <div id="tutCurtainL" style="position: absolute; top: 0; left: 0; width: 50%; height: 100%; background: #800000; transition: transform 4s ease-in-out; border-right: 1px solid rgba(0,0,0,0.3);"></div>
            <div id="tutCurtainR" style="position: absolute; top: 0; right: 0; width: 50%; height: 100%; background: #800000; transition: transform 4s ease-in-out; border-left: 1px solid rgba(0,0,0,0.3);"></div>
        </div>

        <button id="tutBtn" style="background: #e74c3c; color: white; padding: 15px 40px; border-radius: 40px; font-family: 'Special Elite', cursive; font-size: 18px; cursor: pointer; display: none; border: none; box-shadow: 0 4px 15px rgba(231,76,60,0.3);">ANLADIM, BAŞLAT!</button>
    </div>

    <script>
        (function() {
            const overlay = document.getElementById('tutorialOverlay');
            const crank = document.getElementById('tutCrank');
            const arrow = document.getElementById('tutArrow');
            const curtainL = document.getElementById('tutCurtainL');
            const curtainR = document.getElementById('tutCurtainR');
            const message = document.getElementById('tutMessage');
            const btn = document.getElementById('tutBtn');
            let step = 0;

            function runTutorial() {
                if (step >= 2) {
                    message.innerHTML = "Great! You're ready now.<br>We hope you enjoy the show.";
                    btn.style.display = "block";
                    arrow.classList.remove('animate-arrow');
                    arrow.style.opacity = "0";
                    return;
                }

                // Başlangıç Ayarları
                arrow.classList.add('animate-arrow');
                message.innerText = "Begin slowly turning the handle in the direction indicated.";
                
                // 5 Saniyelik Dönüş Başlar
                crank.style.transform = `rotate(${(step + 1) * 370}deg)`;
                
                // Perde Açılışı (1.5sn sonra)
                setTimeout(() => {
                    curtainL.style.transform = "translateX(-100%)";
                    curtainR.style.transform = "translateX(100%)";
                }, 1500);

                // Yazı Değişimi (3. saniyede)
                setTimeout(() => {
                    message.innerHTML = "o move to the new scene,<br><b>he wrist will stop at the 1 o'clock position, and the text and story of the new scene will begin.</b> ";
                }, 3000);

                // Reset ve Döngü (7.5sn toplam süre)
                setTimeout(() => {
                    curtainL.style.transform = "translateX(0)";
                    curtainR.style.transform = "translateX(0)";
                    step++;
                    setTimeout(runTutorial, 2000);
                }, 7500);
            }

            btn.addEventListener('click', () => {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 500);
            });

            // Sitenin kendi loadingScreen'i bittiğinde çalışması için kontrol
            const checkLoader = setInterval(() => {
                const loader = document.getElementById('loadingScreen');
                if (!loader || loader.style.display === 'none' || loader.style.opacity === '0') {
                    clearInterval(checkLoader);
                    setTimeout(runTutorial, 1000);
                }
            }, 500);
        })();
    </script>

    <script>
        const IMAGE_PATH = "resimler/";
        const MY_IMAGES = ["sahne0.jpg","sahne1.jpg","sahne2.jpg","sahne3.jpg","sahne4.jpg","sahne5.jpg","sahne6.jpg","sahne7.jpg","sahne8.jpg","sahne9.jpg","sahne10.jpg","sahne11.jpg","sahne12.jpg","sahne13.jpg","sahne14.jpg","sahne15.jpg","sahne16.jpg","sahne17.jpg","sahne18.jpg","sahne19.jpg","sahne20.jpg","sahne21.jpg","sahne22.jpg","sahne23.jpg","sahne24.jpg","sahne25.jpg","sahne26.jpg","sahne27a.jpg","sahne28.jpg","sahne29.jpg"];

        const SCENE_TEXTS = [
   `You can listen to the story for each episode separately. To do this, you need to align the image perfectly with the scene. Each time you turn the joystick, the story of that image will begin and appear as subtitles. Enjoy watching!`,         
`BAUBA: The King of the Hubhubs`,

 `Chapter 1: Children of Moonlight: In the farthest corner of the universe, there was an ancient planet. At the heart of this planet lived the Moonlight Tribe. These beings, who called themselves Hubhubs, were nourished by neither bread nor water; their only source of life was the innocent moonlight that streamed down from the sky. They drew their energy from this light and nourished their souls with it.`, 

`Chapter 2: A Missing Hope: Although the wise leader of the tribe was much loved by his people, he carried a deep ache in his heart. As time passed, the fact that he had no child pushed him into the dark depths of sorrow. He would look at the sky from the balcony of his palace, imagining that the silence would be broken by the sound of a child's voice.`, 

`Chapter 3: The Holy Supplication: Finally, the leader and his wife raised their hands to the sky and prayed to the God of Moonlight. With the pure desire in their hearts, they asked for a miracle that would continue their lineage. Their prayers echoed in the compassionate light of the moon.`, 

`Chapter 4: The First Traces of the Miracle:The prayers had not gone unanswered. One morning, the female leader awoke with an indescribable warmth within her. A tiny life, a Hubhub, was sprouting in her womb. This was not only a sign of a baby, but also a harbinger of the tribe's future.`,
 
`Chapter 5: The Great Feast:When the news reached the tribe, the ground shook. Celebrations lasted for days, songs were sung. The Hubhubs, dancing under the moonlight, declared this miracle their greatest festival.`, 

`Chapter 6: The Name and the Prophecy: Months passed, the time of birth approaching. The Hubhubs were such a mysterious tribe that their babies would connect with the world and begin to speak while still in the womb. The tribe gathered to hear the baby's voice. The name the baby chose for itself echoed in the void of the universe: Bauba.`, 

`Chapter 7: A Bad Intuition: However, with only a few days left until the birth, Bauba began to become restless. In his mother's womb, an unusual movement was causing him pain. When the wise men asked him the reason, Bauba's unborn voice trembled as he replied: "I feel something bad... I feel the energy being drawn from within me, the light diminishing." The leader shuddered at these words but tried not to show his fear to his people.`,
 
`Chapter 8: The Fall of Darkness: As time sped by, the ominous feeling Bauba had experienced descended upon the entire tribe. One night, the moonlight in the sky first faded, then slowly began to disappear. As the light diminished, the joy of the Hubhubs waned, their bodies grew weary. The tribe was facing the greatest catastrophe in its history.`,
 
`Chapter 9: The Council of Wise Men: The elders of the tribe gathered around the ancient table, leaning on their staffs. It was decided to form a research team to stop this silent death. Finding out why the light had left had now become a battle for survival. `,
 
`Chapter 10: The Light Thieves: The team's investigations revealed the painful truth: the moonlight hadn't disappeared due to natural events, it had been stolen! A group of gigantic, imposing, and merciless creatures had imprisoned the light of the sky in their dark lair. The tribal leader personally took on the task of confronting these giants for the future of his people and set off on his journey.`,
 
`Chapter 11: The Confrontation: After a long and arduous journey, the leader reached the monsters' lair. The sight before him was terrifying; the vast sky seemed to have been shattered into pieces.`, 

`Chapter 12: The Price of Light: The giant creatures, with their roaring voices, declared that the light now belonged to them, and that if the Hubhubs wanted to benefit from this light, they would have to pay a heavy price. The leader was furious; "Light belongs to nature, it cannot be anyone's property! That light is our life!" he said, but he couldn't convince the giants. Realizing there was no other way, the leader declared war. `,
 
`Chapter 13: An Untimely Birth: The tribe's strongest warriors had gathered, setting out on a campaign with great fervor. But, in a strange twist of fate, Bauba was born at that very moment. The tribe didn't know whether to rejoice at this birth in the midst of darkness or to mourn in the shadow of war.`,
 
`Chapter 14: The Pain of Defeat: The giants were not willing to return the light. Hubhub's army, depleted of its former strength due to the extinguishing of its lights, suffered heavy defeats one after another. Each attack brought more exhaustion and more despair. Their energy-depleted bodies became incapable of wielding swords.`, 

`Chapter 15: On the Brink of Death:They finally gave up. In despair, exhausted, they returned to their village and began to await death. What saddened them most was not the fact that they were going to die, but that little Bauba could not be bathed in the sacred moonlight when he was born, as was customary.`,
 
`Chapter 16: Child of Darkness: But a miracle occurred that no one noticed: Bauba managed to be born in pure darkness, without moonlight! This made him different from the rest of the tribe. He was the first Hubhub who could gain strength without needing light. As Bauba grew, this mysterious power began to be noticed by the tribe. He was the people's last hope, a flower blooming in the darkness. While the people withered day by day, the elders of the tribe began to train Bauba with the last of their strength. Bauba became as hard as steel, both physically and spiritually. And finally, the day of salvation knocked on the door. `, 

`Chapter 17: The Lone Warrior: Bauba, clad in his own armor and accompanied by the prayers of his people, set out alone towards the giants' lair.`, 

`Chapter 18: The Final Warning: When Bauba stood before the giants, he chose to speak first. "What you are doing is not just stealing the light, it is suffocating a people. Release him!" he said. But the giants, overcome by their arrogance, turned this little hero away with laughter. Words were no longer enough; swords were drawn.`, 

`Chapter 19: The Color of Victory: When the battle began, the giants were in great shock. Bauba, born in darkness, possessed all the secrets of darkness and drew strength not from weakness, but from darkness itself. He brought them all to their knees one by one. With a great roar, he defeated the giants and shattered the hideous dungeon where the light was imprisoned.`, 

`Chapter 20: The Return of the Sky. Bauba, freeing the enormous moon from its imprisonment in the dark, watched as the light re-embroidered the sky like lace. At that moment, something else happened: When the sacred moonlight touched Bauba's body, the power within him multiplied. His power, forged in darkness, merged with the light, transforming Bauba into the most powerful being in all the lands.`,

`Chapter 21: Homecoming: Bauba returned to his tribe with a great victory. He recounted everything he had experienced to his people, who had been revived by the arrival of the light. Despite being at the peak of his power, he proved his wisdom by saying that he still had much to learn and would continue his education.`, 

`Chapter 22: A New Era: He promised that when the time came, he would be a just leader for his people and proudly carry his father's glorious name. Under the silvery light they had regained, the Moonlight Tribe celebrated Bauba's victory with festivities that lasted for days.`,
 
`This is Bauba's story... To be a hero, you have to make the right decisions at the right time.`,
 `Written and Illustrated by: Hasan Yavuz`,
         ];

        const SCENE_SPEEDS = [
            25, // Scene 1  (Intro - You can listen...)
            8,  // Scene 2  (BAUBA: The King...)
            40, // Scene 3  (Chapter 1)
            40, // Scene 4  (Chapter 2)
            40, // Scene 5  (Chapter 3)

            38, // Scene 7  (Chapter 5)

            50, // Scene 9  (CHAPTER 7 - BURAYI DEĞİŞTİRİN)
            40, // Scene 10 (Chapter 8)
            38, // Scene 11 (Chapter 9)
            50, // Scene 12 (Chapter 10)
            35, // Scene 13 (Chapter 11)
            55, // Scene 14 (Chapter 12)
            40, // Scene 15 (Chapter 13)
            40, // Scene 16 (Chapter 14)

            10, // Scene 27 (Ekstra Görsel/Boşluk)
            10, // Scene 28 (Ekstra Görsel/Boşluk)
            10, // Scene 29 (Ekstra Görsel/Boşluk)
            10  // Scene 30 (Ekstra Görsel/Boşluk)
        ];

        const scrollContent = document.getElementById('scrollContent');
        const crankHandle = document.getElementById('crankHandle');
        const curtainLeft = document.getElementById('curtainLeft');
        const curtainRight = document.getElementById('curtainRight');
        const statusText = document.getElementById('statusText');
        const bgMusic = document.getElementById('bgMusic');
        const subHolder = document.getElementById('subHolder');
        const subText = document.getElementById('subText');
        const bannerImg = document.getElementById('bannerImg');

        MY_IMAGES.forEach((src) => {
            const img = document.createElement('img');
            img.src = IMAGE_PATH + src;
            img.className = 'crankie-image';
            scrollContent.appendChild(img);
        });

        let currentRotation = 0; 
        let lastAngle = 0;
        let isDragging = false;
        let musicStarted = false; 
        const CURTAIN_OPEN_THRESHOLD = 360; 
        let currentTrackName = "fon.mp3"; 
        let lastActiveIndex = -1;

        // --- TAM EKRAN FONKSİYONU ---
        function toggleFullScreen() {
            const doc = window.document;
            const docEl = doc.documentElement;

            const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

            if (window.innerWidth > window.innerHeight) { // Yatay modda mıyız?
                if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                    if (requestFullScreen) requestFullScreen.call(docEl);
                }
            } else { // Dikey modda mıyız?
                if (doc.fullscreenElement || doc.mozFullScreenElement || doc.webkitFullscreenElement || doc.msFullscreenElement) {
                    if (cancelFullScreen) cancelFullScreen.call(doc);
                }
            }
        }

        // Oryantasyon değiştiğinde kontrol et
        window.addEventListener('resize', toggleFullScreen);

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('loadingScreen').style.opacity = '0';
                setTimeout(() => document.getElementById('loadingScreen').style.display = 'none', 800);
                updateStage();
            }, 1000); 
        });

        function changeMusic(fileName) {
            if (currentTrackName !== fileName) {
                currentTrackName = fileName;
                bgMusic.src = IMAGE_PATH + fileName;
                bgMusic.loop = false; //
                bgMusic.play().catch(() => {});
            }
        }

        function updateStage() {
            if (currentRotation <= CURTAIN_OPEN_THRESHOLD) {
                const progress = Math.max(0, currentRotation / CURTAIN_OPEN_THRESHOLD);
                curtainLeft.style.transform = `translateX(${-progress * 110}%)`;
                curtainRight.style.transform = `translateX(${progress * 110}%)`;
                bannerImg.style.display = "block";
                bannerImg.style.transform = `translateX(${-progress * 120}%)`;
                subText.style.display = "none";
                changeMusic("fon.mp3"); 
                statusText.innerText = "The curtain opens...";
            } else {
                curtainLeft.style.transform = `translateX(-110%)`;
                curtainRight.style.transform = `translateX(110%)`;
                bannerImg.style.display = "none";
                subText.style.display = "inline-block";
                
                const firstImg = scrollContent.querySelector('img');
                const imageWidth = firstImg ? firstImg.offsetWidth : 100;
                const dynamicSensitivity = imageWidth / 360;

                let scrollPos = (currentRotation - CURTAIN_OPEN_THRESHOLD) * dynamicSensitivity;
                const maxScroll = scrollContent.scrollWidth - imageWidth;
                if (scrollPos > maxScroll) {
                    scrollPos = maxScroll;
                    currentRotation = (maxScroll / dynamicSensitivity) + CURTAIN_OPEN_THRESHOLD;
                }

                scrollContent.style.transform = `translateX(${-scrollPos}px)`;

                let activeIndex = Math.floor(scrollPos / imageWidth);
                if (activeIndex < 0) activeIndex = 0;
                if (activeIndex > 35) activeIndex = 35;

                if(activeIndex !== lastActiveIndex) {
                    subText.innerText = SCENE_TEXTS[activeIndex] || "";
                    const currentSpeed = SCENE_SPEEDS[activeIndex] || 40;
                    subText.style.animation = "none"; 
                    subText.offsetHeight; 
                    subText.style.animation = `marquee ${currentSpeed}s linear infinite`; 
                    lastActiveIndex = activeIndex;
                }

                let musicNum = activeIndex + 2; 
                if (musicNum > 36) musicNum = 36; 
                changeMusic(`fon${musicNum}.mp3`);
                statusText.innerText = `Sahne: ${activeIndex + 1} / 36`;
            }
        }

        function handleMove(e) {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = crankHandle.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const newAngle = Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);
            let delta = newAngle - lastAngle;
            if (delta > 180) delta -= 360;
            if (delta < -180) delta += 360;
            currentRotation += delta;
            if (currentRotation < 0) currentRotation = 0;
            lastAngle = newAngle;
            crankHandle.style.transform = `rotate(${currentRotation}deg)`;
            updateStage();
        }

        const start = (e) => {
            // Kullanıcı dokunduğunda tam ekranı tetikle (Cihaz yataysa)
            toggleFullScreen();

            if (!musicStarted) {
                bgMusic.play().catch(() => {});
                musicStarted = true;
            }
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = crankHandle.getBoundingClientRect();
            lastAngle = Math.atan2(clientY - (rect.top + rect.height/2), clientX - (rect.left + rect.width/2)) * (180/Math.PI);
        };

        const stop = () => { isDragging = false; };

        crankHandle.addEventListener('mousedown', start);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', stop);
        crankHandle.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); }, { passive: false });
        window.addEventListener('touchmove', (e) => { handleMove(e); }, { passive: false });
        window.addEventListener('touchend', stop);

        document.getElementById('playBtn').addEventListener('click', () => { toggleFullScreen(); bgMusic.play(); musicStarted = true; });
        document.getElementById('stopBtn').addEventListener('click', () => bgMusic.pause());
    </script>
</body>
</html>
