<head>
    <div id="tutorialOverlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 10000; opacity: 1; transition: opacity 0.5s ease;">

        <div id="tutMessage" style="font-family: 'Special Elite', cursive, sans-serif; font-size: 19px; margin-bottom: 30px; min-height: 85px; color: #1a1a1a; line-height: 1.5;">
            Hoş Geldiniz!<br>Hazırlanıyor...
        </div>
        
        <div style="position: relative; width: 140px; height: 140px; margin: 20px 0;">
            <svg id="tutArrow" style="position: absolute; top: -10px; left: -10px; width: 160px; height: 160px; pointer-events: none; opacity: 0; transition: opacity 0.5s;" viewBox="0 0 100 100">
                <path d="M 50,10 A 40,40 0 0 1 90,50" fill="none" stroke="#e74c3c" stroke-width="4" stroke-linecap="round" />
                <polyline points="85,40 90,50 80,50" fill="none" stroke="#e74c3c" stroke-width="4" />
                <style>
                    @keyframes arrowAnim { 0% { opacity: 0; transform: rotate(-20deg); } 20% { opacity: 1; } 80% { opacity: 1; transform: rotate(160deg); } 100% { opacity: 0; transform: rotate(180deg); } }
                    .animate-arrow { animation: arrowAnim 6s infinite; }
                </style>
            </svg>
            
            <div id="tutCrank" style="width: 100%; height: 100%; border: 5px solid #1a1a1a; border-radius: 50%; position: relative; transition: transform 5s ease-in-out; transform: rotate(0deg);">
                <div style="width: 22px; height: 22px; background: #e74c3c; border-radius: 50%; position: absolute; top: 10px; left: 50%; transform: translateX(-50%);"></div>
            </div>
        </div>

        <div style="width: 240px; height: 120px; background: #222; margin: 25px 0; position: relative; overflow: hidden; border: 3px solid #000; border-radius: 5px;">
            <div id="tutCurtainL" style="position: absolute; top: 0; left: 0; width: 50%; height: 100%; background: #800000; transition: transform 4s ease-in-out; border-right: 1px solid rgba(0,0,0,0.3);"></div>
            <div id="tutCurtainR" style="position: absolute; top: 0; right: 0; width: 50%; height: 100%; background: #800000; transition: transform 4s ease-in-out; border-left: 1px solid rgba(0,0,0,0.3);"></div>
        </div>

        <button id="tutBtn" style="background: #e74c3c; color: white; padding: 15px 40px; border-radius: 40px; font-family: 'Special Elite', cursive; font-size: 18px; cursor: pointer; display: none; border: none; box-shadow: 0 4px 15px rgba(231,76,60,0.3);">ANLADIM, BAŞLAT!</button>
    </div>

    <script>
        (function() {
            const overlay = document.getElementById('tutorialOverlay');
            const crank = document.getElementById('tutCrank');
            const arrow = document.getElementById('tutArrow');
            const curtainL = document.getElementById('tutCurtainL');
            const curtainR = document.getElementById('tutCurtainR');
            const message = document.getElementById('tutMessage');
            const btn = document.getElementById('tutBtn');
            let step = 0;

            function runTutorial() {
                if (step >= 2) {
                    message.innerHTML = "Harika! Artık hazırsınız.<br>İyi seyirler dileriz.";
                    btn.style.display = "block";
                    arrow.classList.remove('animate-arrow');
                    arrow.style.opacity = "0";
                    return;
                }

                // Başlangıç Ayarları
                arrow.classList.add('animate-arrow');
                message.innerText = "Kolu gösterilen yönde yavaşça çevirmeye başlayın.";
                
                // 5 Saniyelik Dönüş Başlar
                crank.style.transform = `rotate(${(step + 1) * 370}deg)`;
                
                // Perde Açılışı (1.5sn sonra)
                setTimeout(() => {
                    curtainL.style.transform = "translateX(-100%)";
                    curtainR.style.transform = "translateX(100%)";
                }, 1500);

                // Yazı Değişimi (3. saniyede)
                setTimeout(() => {
                    message.innerHTML = "BİR SONRAKİ HİKAYE İÇİN<br><b>KOLU TURUNCU HALKANIN ÜZERİNE GETİRİN</b> ";
                }, 3000);

                // Reset ve Döngü (7.5sn toplam süre)
                setTimeout(() => {
                    curtainL.style.transform = "translateX(0)";
                    curtainR.style.transform = "translateX(0)";
                    step++;
                    setTimeout(runTutorial, 2000);
                }, 7500);
            }

            btn.addEventListener('click', () => {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 500);
            });

            // Sitenin kendi loadingScreen'i bittiğinde çalışması için kontrol
            const checkLoader = setInterval(() => {
                const loader = document.getElementById('loadingScreen');
                if (!loader || loader.style.display === 'none' || loader.style.opacity === '0') {
                    clearInterval(checkLoader);
                    setTimeout(runTutorial, 1000);
                }
            }, 500);
        })();
    </script>

    <script>
        const IMAGE_PATH = "resimler/";

        const MY_IMAGES = ["sahne01.jpg","sahne02.jpg","sahne2.jpg","sahne3.jpg","sahne4.jpg","sahne5.jpg","sahne6.jpg","sahne7.jpg","sahne8.jpg","sahne9.jpg","sahne10.jpg","sahne11.jpg","sahne12.jpg","sahne13.jpg","sahne14.jpg","sahne15.jpg","sahne16.jpg","sahne17.jpg","sahne18.jpg","sahne19.jpg","sahne20.jpg","sahne21.jpg","sahne22.jpg","sahne23.jpg","sahne24a.jpg","sahne25.jpg","sahne26.jpg","sahne27.jpg","sahne28.jpg","sahne29.jpg"];

        const SCENE_TEXTS = [
           `Hikâyeyi her bölüm için ayrı ayrı dinleyebilirsin. Bunun için resmi sahneye tam denk getirmen gerek. Kolu her çevirdiğinde o resmin hikayesi başlar ve altyazı olarak görünür. İyi seyirler`,
 `Hikayemiz burada başlıyor...  BAUBA: Hubhubların Kralı`,
 `1. Bölüm: Ay Işığının Çocukları: Evrenin en ücra köşesinde kadim bir gezegen varmış. Bu gezegenin kalbinde, Ay Işığı Kabilesi yaşamlarını sürdürürmüş. Kendilerine Hubhub diyen bu varlıklar, ne ekmekle ne de suyla beslenirmiş; onların tek hayat kaynağı, gökyüzünden süzülen o masum ay ışığıymış. Enerjilerini bu ışıktan sağar, ruhlarını onunla beslerlermiş.`, 

`2. Bölüm: Bir Eksik Umut: Kabilenin bilge lideri, halkı tarafından çok sevilse de yüreğinde derin bir sızı taşırmış. Zaman geçip giderken, bir evladının olmaması onu kederin karanlık kuyularına itermiş. Sarayının balkonundan gökyüzüne bakar, bu sessizliği bir çocuk sesinin bölmesini hayal edermiş.`, 

`3. Bölüm: Kutsal Yakarış:Sonunda lider ve eşi, ellerini göğe açarak Ay Işığı Tanrısı’na yakarmışlar. Kalplerindeki saf arzuyla, soylarını devam ettirecek bir mucize dilemişler. Duaları, ayın şefkatli ışığında yankılanmış.`, 

`4. Bölüm: Mucizenin İlk İzleri: Dualar karşılıksız kalmamış. Bir sabah hanım lider, içinde tarif edilemez bir sıcaklıkla uyanmış. Karnında minik bir can, bir Hubhub filizlenmekteymiş. Bu, sadece bir bebeğin değil, kabilenin geleceğinin de müjdecisiymiş.`,
 
`5. Bölüm: Büyük Şölen :Haber kabileye ulaştığında yer yerinden oynamış. Günlerce süren kutlamalar yapılmış, şarkılar söylenmiş. Ay ışığı altında dans eden Hubhublar, bu mucizeyi en büyük bayramları ilan etmişler.`, 

`6. Bölüm: İsim ve Kehanet: Aylar geçmiş, doğum vakti yaklaşmış. Hubhublar öyle gizemli bir kabileymiş ki, bebekleri henüz anne karnındayken dünyayla bağ kurar, konuşmaya başlarmış. Kabile halkı bebeğin sesini duymak için toplanmış. Bebeğin kendine seçtiği isim, evrenin boşluğunda yankılanmış: Bauba.`, 

`7. Bölüm: Kötü Bir Sezgi: Ancak doğuma sayılı günler kala Bauba huzursuzlanmaya başlamış. Annesinin karnında alışılmadık bir hareketlilikle sancılara sebep oluyormuş. Bilgeler ona nedenini sorduklarında, Bauba’nın henüz doğmamış sesi titreyerek cevap vermiş: "Kötü bir şey hissediyorum... İçimdeki enerjinin çekildiğini, ışığın azaldığını hissediyorum." Lider bu sözlerle ürpermiş ama halkına korkusunu belli etmemeye çalışmış.`,
 
`8. Bölüm: Karanlığın Çöküşü: Zaman hızla akıp giderken, Bauba’nın hissettiği o uğursuzluk tüm kabilenin üzerine çökmüş. Bir gece, gökyüzündeki ay ışığı önce solmuş, sonra yavaş yavaş kaybolmaya başlamış. Işık azaldıkça Hubhubların neşesi sönmüş, bedenleri bitkin düşmüş. Kabile, tarihindeki en büyük felaketle yüzleşiyormuş.`,
 
`9. Bölüm: Bilgeler Meclisi: Kabilenin en yaşlıları, asalarına dayanarak kadim masanın başında bir araya gelmişler. Bu sessiz ölümü durdurmak için bir araştırma ekibi kurulmasına karar verilmiş. Işığın neden terk ettiğini bulmak, artık bir varoluş savaşına dönüşmüş.`,
 
`10. Bölüm: Işık Hırsızları: Ekibin araştırmaları acı gerçeği ortaya çıkarmış: Ay ışığı doğa olaylarıyla kaybolmamış, resmen çalınmış! Devasa, heybetli ve acımasız canlılardan oluşan bir grup, gökyüzünün nurunu kendi karanlık hanelerine hapsetmişler. Kabile lideri, halkının geleceği için bu devlerle yüzleşme görevini bizzat üstlenmiş ve yola koyulmuş.`,
 
`11. Bölüm: Yüzleşme: Lider, uzun ve meşakkatli bir yolculuğun ardından canavarların inine ulaşmış. Karşısındaki manzara ürkütücüymüş; koca gökyüzü parçalara ayrılmış gibi duruyormuş.`, 

`12. Bölüm: Işığın Bedeli: Dev canlılar, kükreyen sesleriyle ışığın artık kendilerine ait olduğunu, eğer Hubhublar bu ışıktan faydalanmak istiyorlarsa ağır bedeller ödemeleri gerektiğini söylemişler. Lider çok öfkelenmiş; "Işık doğanındır, kimsenin malı olamaz! Bizim canımız o ışıktır!" dese de devleri ikna edememiş. Başka yol kalmadığını anlayan lider, savaş ilan etmiş.`,
 
`13. Bölüm: Zamansız Doğum: Kabilenin en güçlü savaşçıları toplanmış, büyük bir hırsla sefere çıkılmış. Ancak kaderin garip bir cilvesi olarak, tam o sırada Bauba dünyaya gözlerini açmış. Kabile, karanlığın ortasında gelen bu doğuma sevinse mi yoksa savaşın gölgesinde yas mı tutsa bilememiş.`,
 
`14. Bölüm: Mağlubiyetin Acısı:Devler, ışığı geri vermeye niyetli değilmiş. Işıkları söndüğü için eski güçlerinden eser kalmayan Hubhub ordusu, üst üste ağır yenilgiler almış. Her saldırı, daha fazla yorgunluk ve daha fazla umutsuzluk getirmiş. Enerjisiz kalan bedenleri, kılıç tutamaz hale gelmiş.`, 

`15. Bölüm: Ölümün Kıyısında: Sonunda pes etmişler. Çaresizlik içinde, enerjileri tükenmiş bir halde köylerine dönüp ölümü beklemeye başlamışlar. Onları en çok üzen şey ise ölecek olmaları değil, minik Bauba’nın geleneklere uygun olarak doğduğunda kutsal ay ışığında yıkanamamış olmasıymış.`,
 
`16. Bölüm: Karanlığın Çocuğu: Fakat kimsenin fark etmediği bir mucize gerçekleşmiş: Bauba, ay ışığı olmadan, saf karanlığın içinde doğmayı başarmış! Bu durum onu kabilenin geri kalanından farklı kılıyormuş. O, ışığa ihtiyaç duymadan da güçlenebilen ilk Hubhub'mış. Bauba büyüdükçe, bu gizemli güç kabile tarafından fark edilmeye başlanmış. O, halkın son umudu, karanlıkta açan bir çiçekmiş. Halkı gün be gün solarken, kabilenin yaşlıları ellerinde kalan son güçle Bauba’yı eğitmeye başlamışlar. Bauba, hem fiziksel hem de ruhsal olarak çelik gibi sertleşmiş. Ve sonunda, kurtuluş günü kapıyı çalmış.`, 

`17. Bölüm: Yalnız Savaşçı: Kendi zırhını kuşanmış olan Bauba, halkının dualarını yanına alarak devlerin inine doğru tek başına yola çıkmış.`, 

`18. Bölüm: Son Uyarı: Bauba, devlerin karşısına dikildiğinde önce konuşmayı seçmiş. "Yaptığınız şey sadece ışığı çalmak değil, bir halkın nefesini kesmektir. Onu serbest bırakın!" demiş. Ancak kibirlerine yenik düşen devler, bu küçük kahramanı kahkahalarla geri çevirmişler. Artık söz bitmiş, kılıçlar çekilmiş.`, 

`19. Bölüm: Zaferin Rengi: Savaş başladığında devler büyük bir şok yaşamış. Bauba, karanlıkta doğduğu için karanlığın tüm sırlarına hakimmiş ve zayıflıktan değil, karanlıktan güç alıyormuş. Teker teker hepsini dize getirmiş. Büyük bir gürültüyle devleri yenmiş ve ışığın tutsak edildiği o çirkin mahzeni parçalamış.`, 

`20. Bölüm: Gökyüzünün Dönüşü: Kocaman ayı, hapsedildiği o karanlık yerden çıkaran Bauba, ışığın gökyüzünü yeniden nasıl bir dantel gibi işlediğini izlemiş. O an bir şey daha olmuş: Kutsal ay ışığı Bauba’nın vücuduna değdiğinde, içindeki güç katlanarak artmış. Karanlıkta yoğrulan gücü, ışıkla birleşince Bauba tüm diyarların en kudretli varlığına dönüşmüş.`,

`21. Bölüm: Eve Dönüş: Bauba, büyük bir zaferle kabilesine dönmüş. Işığın gelişiyle canlanan halkına, yaşadığı her şeyi bir bir anlatmış. Gücünün zirvesinde olmasına rağmen, hala öğrenecek çok şeyi olduğunu ve eğitimine devam edeceğini söyleyerek bilgeliğini kanıtlamış.`, 

`22. Bölüm: Yeni Bir Çağ: Zamanı geldiğinde halkı için adil bir reis olacağına ve babasının şanlı ismini gururla taşıyacağına söz vermiş. Ay Işığı Kabilesi, yeniden kavuştukları gümüşi ışığın altında, günlerce süren şenliklerle Bauba’nın zaferini kutlamışlar.`,
 
`İşte bu Bauba'nın hikayesi... Kahraman olmak için doğru kararları doğru zamanda vermek gerekir.`,
 `Yazan ve Resimleyen: Hasan Yavuz`,
          ];

        const SCENE_SPEEDS = [
    18, // Sahne 1  (Giriş/Tanıtım)

    42, // Sahne 10 (8. Bölüm)

        const scrollContent = document.getElementById('scrollContent');
        const crankHandle = document.getElementById('crankHandle');
        const curtainLeft = document.getElementById('curtainLeft');
        const curtainRight = document.getElementById('curtainRight');
        const statusText = document.getElementById('statusText');
        const bgMusic = document.getElementById('bgMusic');
        const subHolder = document.getElementById('subHolder');
        const subText = document.getElementById('subText');
        const bannerImg = document.getElementById('bannerImg');

        MY_IMAGES.forEach((src) => {
            const img = document.createElement('img');
            img.src = IMAGE_PATH + src;
            img.className = 'crankie-image';
            scrollContent.appendChild(img);
        });

        let currentRotation = 0; 
        let lastAngle = 0;
        let isDragging = false;
        let musicStarted = false; 
        const CURTAIN_OPEN_THRESHOLD = 360; 
        let currentTrackName = "fon.mp3"; 
        let lastActiveIndex = -1;

        // --- TAM EKRAN FONKSİYONU ---
        function toggleFullScreen() {
            const doc = window.document;
            const docEl = doc.documentElement;

            const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

            if (window.innerWidth > window.innerHeight) { // Yatay modda mıyız?
                if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                    if (requestFullScreen) requestFullScreen.call(docEl);
                }
            } else { // Dikey modda mıyız?
                if (doc.fullscreenElement || doc.mozFullScreenElement || doc.webkitFullscreenElement || doc.msFullscreenElement) {
                    if (cancelFullScreen) cancelFullScreen.call(doc);
                }
            }
        }

        // Oryantasyon değiştiğinde kontrol et
        window.addEventListener('resize', toggleFullScreen);

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('loadingScreen').style.opacity = '0';
                setTimeout(() => document.getElementById('loadingScreen').style.display = 'none', 800);
                updateStage();
            }, 1000); 
        });

        function changeMusic(fileName) {
            if (currentTrackName !== fileName) {
                currentTrackName = fileName;
                bgMusic.src = IMAGE_PATH + "tr/" + fileName;
                bgMusic.loop = false; //
                bgMusic.play().catch(() => {});
            }
        }

        function updateStage() {
            if (currentRotation <= CURTAIN_OPEN_THRESHOLD) {
                const progress = Math.max(0, currentRotation / CURTAIN_OPEN_THRESHOLD);
                curtainLeft.style.transform = `translateX(${-progress * 110}%)`;
                curtainRight.style.transform = `translateX(${progress * 110}%)`;
                bannerImg.style.display = "block";
                bannerImg.style.transform = `translateX(${-progress * 120}%)`;
                subText.style.display = "none";
                changeMusic("fon.mp3"); 
                statusText.innerText = "Perde açılıyor...";
            } else {
                curtainLeft.style.transform = `translateX(-110%)`;
                curtainRight.style.transform = `translateX(110%)`;
                bannerImg.style.display = "none";
                subText.style.display = "inline-block";
                
                const firstImg = scrollContent.querySelector('img');
                const imageWidth = firstImg ? firstImg.offsetWidth : 100;
                const dynamicSensitivity = imageWidth / 360;

                let scrollPos = (currentRotation - CURTAIN_OPEN_THRESHOLD) * dynamicSensitivity;
                const maxScroll = scrollContent.scrollWidth - imageWidth;
                if (scrollPos > maxScroll) {
                    scrollPos = maxScroll;
                    currentRotation = (maxScroll / dynamicSensitivity) + CURTAIN_OPEN_THRESHOLD;
                }

                scrollContent.style.transform = `translateX(${-scrollPos}px)`;

                let activeIndex = Math.floor(scrollPos / imageWidth);
                if (activeIndex < 0) activeIndex = 0;
                if (activeIndex > 35) activeIndex = 35;

                if(activeIndex !== lastActiveIndex) {
                    subText.innerText = SCENE_TEXTS[activeIndex] || "";
                    const currentSpeed = SCENE_SPEEDS[activeIndex] || 40;
                    subText.style.animation = "none"; 
                    subText.offsetHeight; 
                    subText.style.animation = `marquee ${currentSpeed}s linear infinite`; 
                    lastActiveIndex = activeIndex;
                }

                let musicNum = activeIndex + 2; 
                if (musicNum > 36) musicNum = 36; 
                changeMusic(`fon${musicNum}.mp3`);
                statusText.innerText = `Sahne: ${activeIndex + 1} / 36`;
            }
        }

        function handleMove(e) {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = crankHandle.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const newAngle = Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);
            let delta = newAngle - lastAngle;
            if (delta > 180) delta -= 360;
            if (delta < -180) delta += 360;
            currentRotation += delta;
            if (currentRotation < 0) currentRotation = 0;
            lastAngle = newAngle;
            crankHandle.style.transform = `rotate(${currentRotation}deg)`;
            updateStage();
        }

        const start = (e) => {
            // Kullanıcı dokunduğunda tam ekranı tetikle (Cihaz yataysa)
            toggleFullScreen();

            if (!musicStarted) {
                bgMusic.play().catch(() => {});
                musicStarted = true;
            }
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = crankHandle.getBoundingClientRect();
            lastAngle = Math.atan2(clientY - (rect.top + rect.height/2), clientX - (rect.left + rect.width/2)) * (180/Math.PI);
        };

        const stop = () => { isDragging = false; };

        crankHandle.addEventListener('mousedown', start);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', stop);
        crankHandle.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); }, { passive: false });
        window.addEventListener('touchmove', (e) => { handleMove(e); }, { passive: false });
        window.addEventListener('touchend', stop);

        document.getElementById('playBtn').addEventListener('click', () => { toggleFullScreen(); bgMusic.play(); musicStarted = true; });
        document.getElementById('stopBtn').addEventListener('click', () => bgMusic.pause());
    </script>


    <style>
    /* Tasarım kodları */
    .crank-wrapper { position: relative !important; }
    #hubhubZirhliHalka {
        position: absolute !important;
        width: 32px !important;
        height: 32px !important;
        border: 4px solid #ff9800 !important;
        background-color: transparent !important;
        border-radius: 50% !important;
        top: 50% !important;
        left: 50% !important;
        margin-top: -16px !important;
        margin-left: -16px !important;
        /* Yörünge ve açı */
        transform: rotate(10deg) translateY(-54px) !important;
        z-index: 999999 !important;
        pointer-events: none !important;
        opacity: 0 !important; /* Yükleme sırasında görünmemesi için önce gizli */
        transition: background-color 0.15s ease, opacity 0.3s ease !important;
        box-shadow: 0 0 10px rgba(0,0,0,0.5) !important;
    }
    #hubhubZirhliHalka.halka-aktif {
        opacity: 1 !important;
    }
    #hubhubZirhliHalka.halka-doldu {
        background-color: #ff9800 !important;
    }
</style>

<script>
try {
    setInterval(function() {
        // Doğrudan ANA SAHNEDEKİ kolu bul
        var handle = document.getElementById('crankHandle');
        
        // Ana kol yoksa bekle
        if (!handle) return;

        // Ana kolun kendi kapsayıcısını bul (Yükleme ekranındakini es geçer)
        var wrapper = handle.parentElement;

        // Halkayı sadece ana sahnedeki wrapper'ın içine ekle
        var halka = document.getElementById('hubhubZirhliHalka');
        if (!halka) {
            halka = document.createElement('div');
            halka.id = 'hubhubZirhliHalka';
            wrapper.appendChild(halka);
        }

        // Ana kolun dönüş değerini oku
        var transformDegeri = handle.style.transform || "";
        var eslesme = transformDegeri.match(/rotate\(([-0-9.]+)deg\)/);
        
        if (eslesme) {
            var derece = parseFloat(eslesme[1]);
            
            // 1. GÖRÜNÜRLÜK: Ana sahnede kolu hafifçe çevirmeye başlayınca (5 derece) halka belirsin
            if (derece > 5) {
                halka.classList.add('halka-aktif');
            } else {
                halka.classList.remove('halka-aktif');
            }

            // 2. DOLGU: 360 birime eşitle ve yörüngeye girince doldur
            var netAci = ((derece % 360) + 360) % 360;
            if (Math.abs(netAci - 10) < 10) {
                halka.classList.add('halka-doldu');
            } else {
                halka.classList.remove('halka-doldu');
            }
        }
    }, 50); // Saniyede 20 kez kontrol
} catch (hata) {
    console.error("Turuncu Halka Hatası:", hata);
}
</script>
