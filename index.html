<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sonsuz Döngülü Kağıt Tiyatrosu - Hubhub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Special+Elite&display=swap');
        
        :root { --curtain-color: #800000; }
        html, body { height: 100%; height: -webkit-fill-available; margin: 0; padding: 0; overflow: hidden; }

        body {
            background-color: #f0f0f0; color: #1a1a1a; font-family: 'Playfair Display', serif;
            display: flex; justify-content: center; align-items: center;
            background-image: url("resimler/arka.jpg"); background-size: cover; background-position: center;
        }

        #loadingScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f0f0f0; background-image: url("resimler/arka.jpg");
            background-size: cover; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease;
        }

        .loader-spin { animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .theatre-container { display: flex; align-items: center; justify-content: center; position: relative; width: 100%; height: 100%; padding: 5px; }
        
        .theatre-box { 
            position: relative; 
            width: 100vmin; 
            height: 100vmin; 
            overflow: hidden; 
            z-index: 10; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .theatre-box::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('resimler/sahne.png'); 
            background-size: 100% 100%;
            background-position: center;
            pointer-events: none; z-index: 60;
        }

        .stage {
            position: absolute; top: 17.1%; left: 15.1%; width: 69.8%; height: 51%;
            display: flex; overflow: hidden; z-index: 20; background: #000;
        }

        .scroll-content { display: flex; will-change: transform; align-items: center; }
        .crankie-image { height: 100%; width: auto; object-fit: cover; display: block; }

        .main-curtain {
            position: absolute; top: 17.1%; width: 35.5%; height: 51%;
            background-color: var(--curtain-color); background-image: url("resimler/perde1.jpg");
            background-size: cover; z-index: 55; transition: transform 0.1s linear;
        }

        .curtain-left { left: 15.1%; transform-origin: left; }
        .curtain-right { right: 15.1%; transform-origin: right; }

        .controls-group { display: flex; flex-direction: column; align-items: center; margin-left: 20px; z-index: 100; }
        .crank-label {
            font-family: 'Special Elite', cursive; font-size: 16px; font-weight: 900; color: white;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
            margin-bottom: 12px; text-align: center; letter-spacing: 1px;
        }

        /* KOL BÜYÜTÜLDÜ: 80px -> 120px */
        .crank-wrapper { width: 120px; height: 120px; }
        .crank-handle {
            width: 100%; height: 100%; background: #fff; border-radius: 50%; border: 4px solid #1a1a1a;
            display: flex; justify-content: center; align-items: center; cursor: grab; touch-action: none;
            position: relative; box-shadow: 6px 8px 0px rgba(0,0,0,0.1);
        }

        /* KOL TOPUZU BÜYÜTÜLDÜ */
        .crank-knob { width: 22px; height: 22px; background: #fff; border: 3px solid #1a1a1a; border-radius: 50%; position: absolute; top: 10px; }

        .music-controls { display: flex; gap: 15px; margin-top: 20px; }
        
        /* BUTONLAR BÜYÜTÜLDÜ: 30px -> 50px */
        .music-btn {
            background: white; border: 3px solid #1a1a1a; border-radius: 50%; width: 55px; height: 55px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 22px;
            box-shadow: 3px 4px 0px rgba(0,0,0,0.1); transition: transform 0.1s;
        }
        .music-btn:active { transform: translateY(2px); box-shadow: 1px 2px 0px rgba(0,0,0,0.1); }

        .instruction { position: fixed; bottom: 10px; width: 100%; text-align: center; opacity: 0.8; font-size: 13px; font-style: italic; z-index: 1000; color: white; }

        @media (orientation: portrait) {
            .theatre-container { flex-direction: column; justify-content: center; padding-top: 2vh; }
            .theatre-box { width: 100vw; height: 100vw; }
            .controls-group { margin-left: 0; margin-top: 30px; }
        }
    </style>
</head>
<body>
    <div id="loadingScreen">
        <div class="crank-label">YÜKLENİYOR...</div>
        <div class="crank-wrapper loader-spin"><div class="crank-handle"><div class="crank-knob"></div></div></div>
    </div>

    <audio id="bgMusic" src="resimler/fon.mp3" loop preload="auto"></audio>

    <div class="theatre-container">
        <div class="theatre-box" id="theatreBox">
            <div id="curtainLeft" class="main-curtain curtain-left"></div>
            <div id="curtainRight" class="main-curtain curtain-right"></div>
            <div class="stage"><div id="scrollContent" class="scroll-content"></div></div>
        </div>

        <div class="controls-group">
            <div class="crank-label">ÇEVİR VE BAŞLAT</div>
            <div class="crank-wrapper">
                <div id="crankHandle" class="crank-handle">
                    <div class="crank-knob"></div>
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path>
                        <polyline points="21 3 21 8 16 8"></polyline>
                    </svg>
                </div>
            </div>
            <div class="music-controls">
                <button id="playBtn" class="music-btn" title="Oynat">▶</button>
                <button id="stopBtn" class="music-btn" title="Durdur">■</button>
            </div>
        </div>
    </div>

    <div class="instruction" id="statusText">Başlamak için kolu çevirin...</div>

    <script>
        const IMAGE_PATH = "resimler/";
        const MY_IMAGES = ["sahne1.jpg","sahne2.jpg","sahne3.jpg","sahne4.jpg","sahne5.jpg","sahne6.jpg","sahne7.jpg","sahne8.jpg","sahne9.jpg","sahne10.jpg","sahne11.jpg","sahne12.jpg","sahne13.jpg","sahne14.jpg","sahne15.jpg","sahne16.jpg","sahne17.jpg","sahne18.jpg","sahne19.jpg","sahne20.jpg","sahne21.jpg","sahne22.jpg","sahne23.jpg","sahne24.jpg","sahne25.jpg","sahne26.jpg","sahne27.jpg","sahne28.jpg","sahne29.jpg","sahne30.jpg","sahne31.jpg","sahne32.jpg","sahne33.jpg","sahne34.jpg","sahne35.jpg","sahne36.jpg"];

        const scrollContent = document.getElementById('scrollContent');
        const crankHandle = document.getElementById('crankHandle');
        const curtainLeft = document.getElementById('curtainLeft');
        const curtainRight = document.getElementById('curtainRight');
        const statusText = document.getElementById('statusText');
        const bgMusic = document.getElementById('bgMusic');

        MY_IMAGES.forEach((src) => {
            const img = document.createElement('img');
            img.src = IMAGE_PATH + src;
            img.className = 'crankie-image';
            scrollContent.appendChild(img);
        });

        let currentRotation = 0; 
        let lastAngle = 0;
        let isDragging = false;
        let musicStarted = false; 
        const CURTAIN_OPEN_THRESHOLD = 360; 
        let currentTrackName = "fon.mp3"; 

        window.addEventListener('load', () => {
            document.getElementById('loadingScreen').style.opacity = '0';
            setTimeout(() => document.getElementById('loadingScreen').style.display = 'none', 500);
        });

        function changeMusic(fileName) {
            if (currentTrackName !== fileName) {
                currentTrackName = fileName;
                bgMusic.src = IMAGE_PATH + fileName;
                bgMusic.loop = (fileName !== "fon36.mp3");
                bgMusic.play().catch(() => {});
            }
        }

        function updateStage() {
            if (currentRotation <= CURTAIN_OPEN_THRESHOLD) {
                const progress = Math.max(0, currentRotation / CURTAIN_OPEN_THRESHOLD);
                curtainLeft.style.transform = `translateX(${-progress * 110}%)`;
                curtainRight.style.transform = `translateX(${progress * 110}%)`;
                changeMusic("fon.mp3"); 
                statusText.innerText = "Perde açılıyor...";
            } else {
                curtainLeft.style.transform = `translateX(-110%)`;
                curtainRight.style.transform = `translateX(110%)`;
                
                const firstImg = scrollContent.querySelector('img');
                const imageWidth = firstImg ? firstImg.offsetWidth : 100;
                const dynamicSensitivity = imageWidth / 360;

                let scrollPos = (currentRotation - CURTAIN_OPEN_THRESHOLD) * dynamicSensitivity;
                
                const maxScroll = scrollContent.scrollWidth - imageWidth;
                if (scrollPos > maxScroll) {
                    scrollPos = maxScroll;
                    currentRotation = (maxScroll / dynamicSensitivity) + CURTAIN_OPEN_THRESHOLD;
                }

                scrollContent.style.transform = `translateX(${-scrollPos}px)`;

                let activeIndex = Math.floor(scrollPos / imageWidth);
                if (activeIndex < 0) activeIndex = 0;
                if (activeIndex > 35) activeIndex = 35;

                let musicNum = activeIndex + 2; 
                if (musicNum > 36) musicNum = 36; 
                
                changeMusic(`fon${musicNum}.mp3`);
                statusText.innerText = `Sahne: ${activeIndex + 1} / 36`;
            }
        }

        function handleMove(e) {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const rect = crankHandle.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const newAngle = Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);

            let delta = newAngle - lastAngle;
            if (delta > 180) delta -= 360;
            if (delta < -180) delta += 360;

            currentRotation += delta;
            if (currentRotation < 0) currentRotation = 0;

            lastAngle = newAngle;
            crankHandle.style.transform = `rotate(${currentRotation}deg)`;
            updateStage();
        }

        const start = (e) => {
            if (!musicStarted) {
                bgMusic.play().catch(err => console.log("Müzik başlatılamadı:", err));
                musicStarted = true;
            }
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = crankHandle.getBoundingClientRect();
            lastAngle = Math.atan2(clientY - (rect.top + rect.height/2), clientX - (rect.left + rect.width/2)) * (180/Math.PI);
        };

        const stop = () => { isDragging = false; };

        crankHandle.addEventListener('mousedown', start);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', stop);
        crankHandle.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); }, { passive: false });
        window.addEventListener('touchmove', (e) => { handleMove(e); }, { passive: false });
        window.addEventListener('touchend', stop);

        document.getElementById('playBtn').addEventListener('click', () => {
            bgMusic.play();
            musicStarted = true;
        });
        document.getElementById('stopBtn').addEventListener('click', () => bgMusic.pause());

        window.onload = () => updateStage();
    </script>
</body>
</html>
