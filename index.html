<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hubhub - Menü</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
        }

        body {
            background-image: url("resimler/arka2.jpg"); 
            background-size: cover; 
            background-position: center;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            font-family: 'Special Elite', cursive;
            gap: 30px; 
        }

        /* --- YÜKLEME EKRANI STİLLERİ (YENİ) --- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #ffffff;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 25px;
        }

        .loading-static-shadow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 8px 10px 0px rgba(0,0,0,0.15);
            z-index: 1;
        }

        .loading-spinner-body {
            position: relative;
            width: 100%;
            height: 100%;
            background: #ffffff;
            border: 5px solid #1a1a1a; 
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            animation: full-rotation 1.0s linear infinite;
        }

        .arrow-svg {
            width: 80px;
            height: 80px;
        }

        @keyframes full-rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 3px;
        }
        /* --- YÜKLEME EKRANI STİLLERİ SONU --- */

        .header-logo {
            max-width: 1000px; 
            width: 90%; 
            height: auto;
            z-index: 10;
        }

        .button-container {
            display: flex;
            gap: 50px; 
            z-index: 10;
        }

        .circle-btn {
            width: 150px;
            height: 150px;
            background: #ffffff;
            border: 6px solid #1a1a1a;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
            color: #1a1a1a;
            box-shadow: 8px 10px 0px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
            position: relative;
        }

        .circle-btn:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }

        .circle-btn:active {
            transform: translateY(4px);
            box-shadow: 2px 4px 0px rgba(0,0,0,0.2);
        }

        .btn-label {
            margin-top: 0px; 
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }

        @media (max-width: 1000px) and (orientation: portrait) {
            .button-container {
                flex-direction: column;
                gap: 20px;
            }
            .circle-btn {
                width: 130px;
                height: 130px;
            }
            .header-logo {
                width: 150%; 
                max-width: none;
                margin-top: 10px;
            }
        }

        @media (max-height: 600px) and (orientation: landscape) {
            body {
                gap: 10px; 
                justify-content: center;
                overflow-y: auto; 
            }
            
            .header-logo {
                width: 40%; 
                max-height: 30vh; 
                object-fit: contain;
            }

            .button-container {
                flex-direction: row; 
                gap: 30px;
            }

            .circle-btn {
                width: 100px; 
                height: 100px;
            }
            
            .btn-label {
                font-size: 14px; 
            }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loading-container">
            <div class="loading-static-shadow"></div>
            <div class="loading-spinner-body">
                <svg class="arrow-svg" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M 4 12 A 8 8 0 1 1 20 12"></path>
                </svg>
            </div>
        </div>
        <div class="loading-text">YÜKLENİYOR...</div>
    </div>

    <img src="resimler/baslik.png" alt="Hubhub Başlık" class="header-logo">

    <div class="button-container">
        <a href="turkce.html" class="circle-btn">
            <span class="btn-label">TÜRKÇE HİKAYE</span>
        </a>
        <a href="ingilizce.html" class="circle-btn">
            <span class="btn-label">ENGLISH STORY</span>
        </a>
    </div>

    <script>
        const startLoading = Date.now();
        window.addEventListener('load', function() {
            const diff = Date.now() - startLoading;
            const delay = Math.max(0, 500 - diff); 
            
            setTimeout(function() {
                const ls = document.getElementById('loading-screen');
                ls.style.opacity = '0';
                setTimeout(() => ls.style.display = 'none', 500);
            }, delay);
        });
    </script>

</body>
</html>
