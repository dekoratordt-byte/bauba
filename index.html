
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hubhub - Menü</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
        }

        body {
            background-image: url("resimler/arka.jpg"); 
            background-size: cover; 
            background-position: center;
            display: flex; 
            flex-direction: column; /* İçeriği dikeyde hizalamak için eklendi */
            justify-content: center; 
            align-items: center;
            font-family: 'Special Elite', cursive;
            gap: 30px; /* Resim ve butonlar arasındaki boşluk */
        }

        /* Başlık resmi için yeni stil */
        .header-logo {
            max-width: 1000px; /* Bilgisayarlarda çok büyük olmaması için */
            width: 90%; /* Mobilde ekranın %80'ini kaplar */
            height: auto;
            z-index: 10;
        }

        .button-container {
            display: flex;
            gap: 50px; 
            z-index: 10;
        }

        .circle-btn {
            width: 150px;
            height: 150px;
            background: #ffffff;
            border: 6px solid #1a1a1a;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
            color: #1a1a1a;
            box-shadow: 8px 10px 0px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
            position: relative;
        }

        .circle-btn::after {
            content: "";
            position: absolute;
            top: 15px;
            width: 20px;
            height: 20px;
            background: #1a1a1a;
            border-radius: 50%;
        }

        .circle-btn:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }

        .circle-btn:active {
            transform: translateY(4px);
            box-shadow: 2px 4px 0px rgba(0,0,0,0.2);
        }

        .btn-label {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }

      /* Mobil Dikey Görünüm (Portrait) */
@media (max-width: 1000px) and (orientation: portrait) {
    .button-container {
        flex-direction: column;
        gap: 20px;
    }
    .circle-btn {
        width: 130px;
        height: 130px;
    }
    .header-logo {
        width: 150%; 
        max-width: none;
        margin-top: 10px;
    }
}

/* Mobil Yatay Görünüm (Landscape) */
@media (max-height: 600px) and (orientation: landscape) {
    body {
        gap: 10px; /* Elemanlar arası boşluğu daraltıyoruz */
        justify-content: center;
        overflow-y: auto; /* Çok küçük ekranlarda kaydırma gerekirse diye */
    }
    
    .header-logo {
        width: 40%; /* Yatayda resmi makul bir boyuta çekiyoruz */
        max-height: 30vh; /* Ekran yüksekliğinin %30'undan fazla yer kaplamasın */
        object-fit: contain;
    }

    .button-container {
        flex-direction: row; /* Butonları yan yana getiriyoruz */
        gap: 30px;
    }

    .circle-btn {
        width: 100px; /* Butonları biraz küçültüyoruz */
        height: 100px;
    }
    
    .btn-label {
        font-size: 14px; /* Yazıları küçültüyoruz */
    }
}
    </style>
</head>
<body>

    <img src="resimler/baslik.png" alt="Hubhub Başlık" class="header-logo">

    <div class="button-container">
        
        <a href="turkce.html" class="circle-btn">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
            <span class="btn-label">TÜRKÇE HİKAYE</span>
        </a>

        <a href="ingilizce.html" class="circle-btn">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            <span class="btn-label">ENGLISH STORY</span>
        </a>

    </div>

</body>
</html>
