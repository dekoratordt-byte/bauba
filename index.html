
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hubhub - Menü</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
        }

        body {
            background-image: url("resimler/arka.jpg"); 
            background-size: cover; 
            background-position: center;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            font-family: 'Special Elite', cursive;
            gap: 30px; 
        }

        .header-logo {
            max-width: 1000px; 
            width: 90%; 
            height: auto;
            z-index: 10;
        }

        .button-container {
            display: flex;
            gap: 50px; 
            z-index: 10;
        }

        .circle-btn {
            width: 150px;
            height: 150px;
            background: #ffffff;
            border: 6px solid #1a1a1a;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
            color: #1a1a1a;
            box-shadow: 8px 10px 0px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
            position: relative;
        }

        /* SİYAH NOKTA BURADAN KALDIRILDI (.circle-btn::after silindi) */

        .circle-btn:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }

        .circle-btn:active {
            transform: translateY(4px);
            box-shadow: 2px 4px 0px rgba(0,0,0,0.2);
        }

        .btn-label {
            margin-top: 0px; /* Oklar kalktığı için hizalamayı merkeze çektik */
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }

        /* Mobil Dikey Görünüm (Portrait) */
        @media (max-width: 1000px) and (orientation: portrait) {
            .button-container {
                flex-direction: column;
                gap: 20px;
            }
            .circle-btn {
                width: 130px;
                height: 130px;
            }
            .header-logo {
                width: 150%; 
                max-width: none;
                margin-top: 10px;
            }
        }

        /* Mobil Yatay Görünüm (Landscape) */
        @media (max-height: 600px) and (orientation: landscape) {
            body {
                gap: 10px; 
                justify-content: center;
                overflow-y: auto; 
            }
            
            .header-logo {
                width: 40%; 
                max-height: 30vh; 
                object-fit: contain;
            }

            .button-container {
                flex-direction: row; 
                gap: 30px;
            }

            .circle-btn {
                width: 100px; 
                height: 100px;
            }
            
            .btn-label {
                font-size: 14px; 
            }
        }
    </style>
</head>
<body>

    <img src="resimler/baslik.png" alt="Hubhub Başlık" class="header-logo">

    <div class="button-container">
        
        <a href="turkce.html" class="circle-btn">
            <span class="btn-label">TÜRKÇE HİKAYE</span>
        </a>

        <a href="ingilizce.html" class="circle-btn">
            <span class="btn-label">ENGLISH STORY</span>
        </a>

    </div>

</body>
</html>
